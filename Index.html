<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KiteSpot Test</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#03080f;
  color:white;
  padding:20px;
}
button{
  padding:16px;
  width:100%;
  background:#00ff88;
  border:none;
  border-radius:10px;
  font-weight:bold;
  font-size:16px;
}
#output{
  margin-top:20px;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<h2>🪁 KiteSpot Analyse (Test)</h2>

<button onclick="runAgent()">Analyseer</button>

<div id="output">Klaar om te testen...</div>

<script>
const WAPI_KEY = '123791b7b5524c13b53193933261304';
const WAPI_BASE = 'https://api.weatherapi.com/v1';

const SPOT = {
  name:'Schellinkhout',
  lat:52.633,
  lon:5.121,
  ideal:'ZO–ZW wind'
};

function kphToKn(k){return (k*0.539957).toFixed(1);}

function windDir(d){
  return ['N','NO','O','ZO','Z','ZW','W','NW'][Math.round(d/45)%8];
}

async function runAgent(){
  const output = document.getElementById('output');
  output.textContent = '⏳ Weerdata ophalen...';

  try{
    // 🌬 Weather
    const wr = await fetch(`${WAPI_BASE}/current.json?key=${WAPI_KEY}&q=${SPOT.lat},${SPOT.lon}`);
    const data = await wr.json();
    const c = data.current;

    const wind = kphToKn(c.wind_kph);
    const gust = kphToKn(c.gust_kph);
    const dir = c.wind_degree;

    const prompt = `
Analyseer kite condities:
Spot: ${SPOT.name}
Wind: ${wind} kn
Stoten: ${gust} kn
Richting: ${dir}° (${windDir(dir)})
Ideaal: ${SPOT.ideal}

Geef korte analyse (max 120 woorden)
`;

    output.textContent = '🤖 Analyse ophalen...';

    // 🔥 Backend call
    const res = await fetch('/api/analyse', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt})
    });

    const result = await res.json();

    if(!res.ok){
      throw new Error(result.error || 'Backend fout');
    }

    output.textContent =
      result.text +
      (result.cached ? '\n\n⚡ uit cache' : '');

  }catch(e){
    output.textContent = '❌ ' + e.message;
  }
}
</script>

</body>
</html>
