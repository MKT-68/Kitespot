<script>
// ── CONFIG ──────────────────────────────────────────────────
const API_URL = "/api/analyse"; // ✅ FIXED

// ── START ────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  renderChips();
  renderInfoSpots();
  setTimeout(() => initMap(), 200);
  loadRanking();
  loadPlanning(); // ✅ now valid
});

// ── PLANNER ──────────────────────────────────────────────────
async function loadPlanning() {
  try {
    const results = await Promise.all(SPOTS.map(async spot => {
      try {
        const r = await fetch("/api/analyse?type=weather", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            lat: spot.lat,
            lon: spot.lon,
            days: 7
          })
        });

        const data = await r.json();
        if (!r.ok || data.error) return { spot, moments: [] };

        const now = new Date(), moments = [];

        data.forecast.forecastday.forEach(fd => {
          fd.hour.forEach(h => {
            const dt = new Date(h.time);
            if (dt <= now) return;

            const wkn = kn(h.wind_kph);
            const deg = h.wind_degree;

            if (wkn < 12 || dscore(deg, spot) <= 0) return;

            moments.push({
              dt,
              dp: h.time.split(' ')[0],
              kn: Math.round(wkn),
              deg
            });
          });
        });

        return { spot, moments };

      } catch (e) {
        console.error("Planner fetch failed", e);
        return { spot, moments: [] };
      }
    }));

    const now = new Date().toLocaleTimeString('nl-NL', {hour:'2-digit',minute:'2-digit'});
    document.getElementById('planTs').textContent = `${now} · WeatherAPI · ≥12 kn + ideale richting`;

    const body = document.getElementById('planBody');
    body.innerHTML = '';

    results.forEach(({ spot, moments }) => {
      const block = document.createElement('div');
      block.className = 'spot-block';

      const cnt = moments.length > 0
        ? `${moments.length} moment${moments.length!==1?'en':''}`
        : 'geen';

      block.innerHTML =
        `<div class="spot-block-hdr">
          <span class="sbh-name">${spot.name}</span>
          <span class="sbh-ideal">${spot.ideal}</span>
          <span class="sbh-count">${cnt}</span>
        </div>`;

      if (!moments.length) {
        block.innerHTML += `<div class="no-moments">Geen kitebare momenten.</div>`;
      } else {
        const byDay = {};
        moments.forEach(m => {
          if (!byDay[m.dp]) byDay[m.dp]=[];
          byDay[m.dp].push(m);
        });

        let t = `<div class="plan-tbl-wrap"><table class="plan-tbl"><tbody>`;

        Object.entries(byDay).forEach(([day, ms]) => {
          ms.forEach(m => {
            const time = `${String(m.dt.getHours()).padStart(2,'0')}:00`;
            t += `<tr>
              <td>${day}</td>
              <td>${time}</td>
              <td>${m.kn}</td>
              <td>${compass(m.deg)}</td>
            </tr>`;
          });
        });

        t += `</tbody></table></div>`;
        block.innerHTML += t;
      }

      body.appendChild(block);
    });

  } catch (err) {
    console.error("Planner crash", err);
  }
}

// ── AGENT ────────────────────────────────────────────────────
async function runAgent() {
  const btn = document.getElementById('analyseBtn');
  btn.disabled = true;

  lg('think', `Agent gestart voor ${sel.name}`); // ✅ FIXED TEMPLATE STRING

  try {
    const wr = await fetch("/api/analyse?type=weather", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        lat: sel.lat,
        lon: sel.lon,
        days: 1
      })
    });

    const data = await wr.json();
    if (!wr.ok || data.error) {
      throw new Error(data.error?.message || "Weather fout");
    }

    const c = data.current;

    const prompt = `Analyseer kitesurf condities voor ${sel.name}.
Wind: ${c.wind_kph}
Richting: ${c.wind_degree}`;

    const ar = await fetch(API_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 300,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const result = await ar.json();

    document.getElementById('aiBody').textContent =
      result.content?.map(b => b.text).join('') || 'Geen antwoord';

    document.getElementById('resultPanel').classList.add('show');

  } catch (err) {
    console.error(err);
    document.getElementById('errorMsg').textContent = err.message;
    document.getElementById('errorMsg').classList.add('show');
  } finally {
    btn.disabled = false;
  }
}
</script>
