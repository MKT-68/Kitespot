<!DOCTYPE html>

<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>KiteSpot</title>

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
/* (UNCHANGED CSS — kept exactly as you wrote it) */
body { background:#03080f; color:white; font-family:sans-serif; }
</style>

</head>

<body>

<h2>KiteSpot Debug Build</h2>

<div id="rankTs">Weerdata ophalen...</div>
<div id="rankBody"></div>

<script>
// ── CONFIG ─────────────────────────────────────
const API_URL = "/api/analyse"; // ✅ FIXED

// ── SPOTS ──────────────────────────────────────
const SPOTS = [
  {name:'Schellinkhout',lat:52.633,lon:5.121},
  {name:'Andijk',lat:52.7393,lon:5.175},
];

// ── HELPERS ────────────────────────────────────
function kn(kph){ return +(kph * 0.539957).toFixed(1); }

// ── RANKING ────────────────────────────────────
async function loadRanking() {
  try {
    const rows = await Promise.all(SPOTS.map(async spot => {
      try {
        const r = await fetch("/api/analyse?type=weather", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            lat: spot.lat,
            lon: spot.lon,
            days: 1
          })
        });

        const data = await r.json();

        if (!r.ok || data.error) {
          console.error("Weather error:", data);
          return null;
        }

        return {
          name: spot.name,
          wind: kn(data.current.wind_kph)
        };

      } catch (e) {
        console.error("Fetch failed:", e);
        return null;
      }
    }));

    const valid = rows.filter(Boolean);

    if (!valid.length) {
      document.getElementById("rankTs").textContent = "Geen data beschikbaar";
      return;
    }

    document.getElementById("rankTs").textContent = "Live data geladen";

    document.getElementById("rankBody").innerHTML =
      valid.map(r => `<div>${r.name}: ${r.wind} kn</div>`).join("");

  } catch (err) {
    console.error(err);
    document.getElementById("rankTs").textContent = "Fout bij laden";
  }
}

// ── PLANNER (FIXED: no top-level await) ────────
async function loadPlanning() {
  try {
    const results = await Promise.all(SPOTS.map(async spot => {
      try {
        const r = await fetch("/api/analyse?type=weather", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            lat: spot.lat,
            lon: spot.lon,
            days: 3
          })
        });

        const data = await r.json();

        if (!r.ok || data.error) return null;

        return {
          name: spot.name,
          days: data.forecast.forecastday.length
        };

      } catch (e) {
        console.error("Planner error:", e);
        return null;
      }
    }));

    console.log("Planner results:", results);

  } catch (err) {
    console.error("Planner crash:", err);
  }
}

// ── AGENT (FIXED URL) ──────────────────────────
async function runAgent() {
  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        model: "claude-sonnet-4",
        messages: [{role:"user", content:"Test analyse"}]
      })
    });

    const data = await res.json();

    console.log("AI response:", data);

  } catch (err) {
    console.error("Agent error:", err);
  }
}

// ── START ──────────────────────────────────────
window.addEventListener("DOMContentLoaded", () => {
  loadRanking();
  loadPlanning();
});
</script>

</body>
</html>
